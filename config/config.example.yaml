# --- 上位机 (Mac/PC) 配置 ---
# 复制此文件为 config.yaml，并填入实际的 IP 和密码
mqtt:
  host: <MQTT_BROKER_IP>   # 例如: 10.42.0.44
  port: 1883
  username:                 # 留空或填写
  password:                 # 留空或填写
  
  topics:
    goal: robot/goal
    initial_pose: robot/initial_pose
    pose: robot/pose
    status: robot/status
    map: robot/map
    scan: robot/scan
    odom: robot/odom

# --- 机器人 (树莓派) 配置 ---
ssh:
  host: <RASPBERRY_PI_IP>   # 例如: 10.42.0.1
  port: 22
  username: pi
  password: <YOUR_SSH_PASSWORD>

# --- 路径 ---
paths:
  map_yaml: "maps/my_map.yaml"             # 地图描述文件的相对或绝对路径
  record_xlsx: "data/location_record.xlsx" # 行驶轨迹记录表格文件
  initial_pose_json: "data/initial_pose.json" # 保存在本地的机器人初始位姿文件--- 界面参数 ---
params:

  map_bounds: [-10, 134, -19.5, 19.5]
  map_scale: 1.0 
  map_pan_x: 0.0
  map_pan_y: 0.0
  enable_shared_origin: true
  show_set_origin_button: true
  show_pan_zoom_button: true

# --- 话题定义 ---
topics:
  amcl_pose_msg_type: geometry_msgs/PoseWithCovarianceStamped
  pose_stamped_msg_type: geometry_msgs/PoseStamped
  power_voltage_msg_type: std_msgs/UInt16
  
  amcl_pose: /amcl_pose
  move_base_goal: /goal_pose
  initial_pose: /initialpose
  power_voltage: /battery
